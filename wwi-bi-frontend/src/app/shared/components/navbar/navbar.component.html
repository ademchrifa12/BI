<nav class="sidebar">
      <div class="sidebar-header">
        <div class="logo">
          <span class="logo-icon">📊</span>
          <span class="logo-text">WWI BI Platform</span>
        </div>
      </div>
      
      <div class="nav-section">
        <span class="nav-section-title">Main Menu</span>
        <ul class="nav-list">
          <li>
            <a routerLink="/dashboard" routerLinkActive="active" class="nav-link">
              <span class="nav-icon">📈</span>
              <span>Dashboard</span>
            </a>
          </li>
          <li>
            <a routerLink="/customers" routerLinkActive="active" class="nav-link">
              <span class="nav-icon">👥</span>
              <span>Customers</span>
            </a>
          </li>
          <li>
            <a routerLink="/products" routerLinkActive="active" class="nav-link">
              <span class="nav-icon">📦</span>
              <span>Products</span>
            </a>
          </li>
          <li>
            <a routerLink="/orders" routerLinkActive="active" class="nav-link">
              <span class="nav-icon">🛒</span>
              <span>Orders</span>
            </a>
          </li>
          <li>
            <a routerLink="/invoices" routerLinkActive="active" class="nav-link">
              <span class="nav-icon">🧾</span>
              <span>Invoices</span>
            </a>
          </li>
        </ul>
      </div>
      
      <div class="sidebar-footer">
        <div class="user-info">
          <div class="user-avatar">{{ getUserInitials() }}</div>
          <div class="user-details">
            <span class="user-name">{{ currentUser?.firstName }} {{ currentUser?.lastName }}</span>
            <span class="user-role">{{ currentUser?.role }}</span>
          </div>
        </div>
        <button class="logout-btn" (click)="logout()">
          <span>🚪</span>
          <span>Logout</span>
        </button>
      </div>
    </nav>
    
    <header class="top-header">
      <div class="header-left">
        <h1 class="page-title">WideWorldImporters BI</h1>
      </div>
      <div class="header-right">
        <span class="role-badge" [class.admin]="currentUser?.role === 'Admin'">
          {{ currentUser?.role }}
        </span>
      </div>
    </header>
